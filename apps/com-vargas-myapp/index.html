<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Install MyApp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#000;color:#fff;
         display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .card{background:#1c1c1e;border-radius:20px;padding:36px 28px;
           max-width:360px;width:100%;text-align:center}
    .icon{width:90px;height:90px;background:#2c2c2e;border-radius:20px;
           margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
           font-size:40px}
    h1{font-size:22px;font-weight:700;margin-bottom:8px}
    .info{color:#8e8e93;font-size:13px;margin-bottom:6px}
    .divider{border:none;border-top:1px solid #2c2c2e;margin:20px 0}
    .btn{display:block;background:#007aff;color:#fff;text-decoration:none;
          padding:16px;border-radius:14px;font-size:17px;font-weight:600;
          margin-top:8px;transition:opacity .2s}
    .btn:active{opacity:.7}
    .note{color:#636366;font-size:12px;margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h1>MyApp</h1>
    <p class="info">Version 2.1</p>
    <p class="info">com.vargas.myapp</p>
    <hr class="divider">
    <a class="btn" href="itms-services://?action=download-manifest&url=https://illyassvvv.github.io/ota/apps/com-vargas-myapp/manifest.plist">Install on iPhone</a>
    <p class="note">Open this page in <strong>Safari</strong> on your iPhone.<br>
    Chrome and other browsers will not work.</p>
  </div>
</body>
</html>
